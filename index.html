<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{

/* HEADER */

header{
text-align:center;

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#020617;
border-bottom:1px solid #1e293b;

top:0;

.logo{
color:#60a5fa;

.menu{
display:flex;

.menu a{
color:#cbd5f5;

margin:auto;
padding:25px;

padding:20px;

.title{
cursor:pointer;

font-weight:600;

.content{

}



.welcome-title{

.welcome-text{
font-size:17px;

line-height:1.8;

padding:12px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #334155;
background:#020617;

<body>
<header>

<nav>



<div class="hamburger" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">

<a href="#" onclick="show('poem')">कविता</a>
<a href="#" onclick="show('muktak')">मुक्तक</a>

</div>
</nav>




<div class="container">
<!-- HOME -->
<div id="home" class="section">
<div class="card">
<h2>स्वागतम्</h2>
<p>
यो वेबसाइट बिआरपी माइलोका गजल, कविता र मुक्तकहरू
पाठकहरूसमक्ष प्रस्तुत गर्न बनाइएको हो।
</p>
</div>

<!-- GAZAL -->

<div id="gazal" class="section" style="display:none">

<input id="gazalSearch" class="search" placeholder="🔍 गजल खोज्नुहोस्..." onkeyup="search('gazalSearch','gazalList')">

<div id="gazalList"></div>

</div>

<!-- POEM -->

<div id="poem" class="section" style="display:none">

<input id="poemSearch" class="search" placeholder="🔍 कविता खोज्नुहोस्..." onkeyup="search('poemSearch','poemList')">

<div id="poemList"></div>

</div>

<!-- MUKTAK -->

<div id="muktak" class="section" style="display:none">

<input id="muktakSearch" class="search" placeholder="🔍 मुक्तक खोज्नुहोस्..." onkeyup="search('muktakSearch','muktakList')">

<div id="muktakList"></div>

</div>

</div>

<footer>

<p>
“मात्र शब्दहरूको संग्रह साहित्य होइन,
यो त समाजको आत्मा र चेतनाको दर्पण हो ।”
</p>

</footer>

<script>

/* MENU */

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* SECTION SHOW */

function show(id){

document.querySelectorAll('.section').forEach(sec=>{
sec.style.display='none';
})

document.getElementById(id).style.display='block';

}

/* TOGGLE POEM */

function toggle(el){

let content=el.nextElementSibling;

content.style.display=
content.style.display==="block"?"none":"block";

}

/* SEARCH */

function search(inputId,listId){

let filter=document.getElementById(inputId).value.toLowerCase();

let cards=document.querySelectorAll("#"+listId+" .card");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();

card.style.display=text.includes(filter)?"block":"none";

})

}

वक्ररेखाहरूसँग 
आफ्नो साइनो गाँस्दैछु।
म कोतर्दै छु। 
मेरै भिरका बाँझा पाखाहरू 
मैले सफलताको सपना देखेर 
आकाशमा उड्न चाहने 
युवा चराहरुलाई समातेँ
कसैका पखेटा काटेँ,
भनेर मेरै देश रङ्गाउनु छ। 

बगिरहेका नदीहरूलाई रोकेँ
बहिरहेको हावालाई सोधेँ 
उडिरहेको बादललाई भेटेँ 
अब चट्याङ झैँ तेजले 
देशको मुहार फेरिँदै छ। 
बन्दैछन् भत्किएका मनहरु 
उठ्दै छन् लडेका लडाकुहरु 
देशको गुदी, 
जो लुटिएको थियो 
अब फिर्ता हुँदैछ परिवर्तनको सपना 
बिहानै उदाउने घामको प्रकाशसँगै 
शुक्ल पक्षको चन्द्रझै 
अब उदाउँदै छन् समृद्धिका झिल्काहरु 
जसरी,
शिशिर पछि बसन्त आउँछ,
अब आउँदैछ 
त्यसरी नै सपनापछि बिपना  ।
आफै बलत्कृत भएर 
रगतको आहालमा डुबेकी 
मेरी चेलीले 
अब,
ओभानो हुने दिन आउँदैछ। 
आउँदैछ सहितकी आमाको 
आँसु रोकिने दिन ।
आउँदैछ मेरो देश 
मेरो देश हुने दिन ।
✏️ बिआरपी माइलो`
	},

{
title:"कविता : आशा र संघर्ष",
content:`मन भित्रको बगैंचामा एउटा फूल रोपेको थें
मगमगाउँदो बास्ना छर्ने सपना मैले देखेको थें

हिउँद ऋतुभरि कुहिरो र शितलहर पर्यो
शिशिर ऋतु नआइकनै सबै पात झर्यो

बल्ल तल्ल वसन्तमा झिनु पालुवा आयो
झिनै आस भएपनि खुशियाली छायो

गृष्ममा स-साना कोपिला देखा परे
दुर्भाग्यबस हुरी आई एकैसाथ झरे

सुहाउँदो वातावरण कहिल्यै आएन
कोपिलामै झर्नु पर्यो फक्रनै पाएन

अरु सबको बगैंचामा त्यहि फूल सरेको छ
मेरो बगैंचामा किन त्यहि फूल मरेको छ

समयले सधैंभरी मलाई नै ठग्यो
वर्षायाम बाढी आई सबै बागाई लाग्यो

फूल फुलाउने उपयुक्त ठाउँ मैले छानिन छु
समय अनुसारको फूल रोज्न मैले जानिन छु

✏️ बिआरपी माइलो`

साधारण परिवारमा जन्मिएको एउटा बालक,
जसको सपनामा राजधानीका उज्याला सडकहरू थिएनन् 
थिए त केवल माटोको गोरेटो,
गाउँका आँखा रसाउने सन्देशहरू,

सानैदेखि मनले बोलेको थियो 
"म लेख्न चाहन्छु,
शब्द मेरो आत्मा हो।"

"देशका लागि केही गर्न सकिन्छ ।

र कलेजको पढाइ

/* LOAD DATA */

function load(list,data){

let container=document.getElementById(list);

data.forEach(d=>{

let card=document.createElement("div");

card.className="card";

card.innerHTML=`
<div class="title" onclick="toggle(this)">${d.title}</div>
<div class="content">${d.content}</div>
`;

container.appendChild(card);

});

}
